version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    volumes:
      - ./app:/app/app
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    env_file: [.env]
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
